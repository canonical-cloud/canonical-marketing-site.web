server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # TLS termination and HSTS belong at the public gateway. These headers are
  # duplicated here so the split static deployment has the same browser
  # protections as the Rust-server fallback.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "DENY" always;
  add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
