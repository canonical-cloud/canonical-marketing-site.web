name: pages

on:
  # Production Pages deploys only the exact main-branch commit that completed
  # the blocking CI workflow (including Playwright + Puppeteer). A parallel
  # push-triggered workflow could otherwise publish while browser CI is red.
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pages-build:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - run: npm ci
      - run: npm test
      - name: Build the canonical.plus site
        run: >-
          npm run build --
          --site https://canonical.plus
          --base /
      - name: Verify root-domain URLs
        shell: bash
        run: |
          grep -q 'href="/"' dist/index.html
          grep -q 'href="/favicon.svg"' dist/index.html
          grep -Eq 'href="/_astro/[^" ]+\.css"' dist/index.html
          ! grep -q '/canonical-marketing-site.web/' dist/index.html
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  pages-deploy:
    needs: pages-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
