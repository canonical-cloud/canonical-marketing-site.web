name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - run: npm ci
      # Static contract specs (site-contract.test.mjs).
      - run: npm test
      # Astro production build — the gating step.
      - run: npm run build

  # Browser e2e (Playwright + Puppeteer). Blocking: the runner installs its
  # own Chromium via `playwright install --with-deps`, so there is no
  # missing-browser excuse; a red run means the site actually regressed.
  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - run: npm ci
      # Install the Chromium builds both runners drive.
      - run: npx playwright install --with-deps chromium
      - name: browser e2e (playwright + puppeteer)
        run: npm run test:browser
