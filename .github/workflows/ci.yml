name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: npm ci || npm install
      # Static contract specs (site-contract.test.mjs).
      - run: npm test
      # Astro production build — the gating step.
      - run: npm run build

  # Browser e2e (Playwright + Puppeteer) needs a real Chrome, so it is
  # best-effort only.
  browser-e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: npm ci || npm install
      # Install the Chromium builds both runners drive.
      - run: npx playwright install --with-deps chromium
      - name: browser e2e (playwright + puppeteer)
        run: npm run test:browser
